version: '3.8'

services:
  web:
    build: .
    container_name: fastapi_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app  # Sincroniza seu código da máquina com o container
    env_file:
      - .env    # Carrega variáveis como APP_NAME e DEBUG
    restart: always
    # O comando abaixo ativa o 'Hot Reload' (salvou o código, o site atualiza)
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload